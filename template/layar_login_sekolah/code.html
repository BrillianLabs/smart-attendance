<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6 bg-geometric">
<!-- Login Shell Suppression applied: No Navigation Shells rendered for Transactional Login screen -->
<main class="w-full max-w-[420px] animate-in fade-in slide-in-from-bottom-4 duration-1000">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-lowest shadow-sm mb-6 overflow-hidden ring-4 ring-surface-container-low">
<img alt="Atelier Academy Logo" class="w-full h-full object-cover" data-alt="Modern minimalist educational crest with teal geometric shapes on a white background, professional and academic aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAn2UZ8QT00VCjk5kiDxwZqp6KQW_-guChQtUtwDTOhChL6x3OlXAXW9DxZCZD07CQC2srzqJjPWez95dmgeju8-Z_jmLti169nVOQo6Z8HRR3fLAbwpAmSZ8909SRSgQ7jBxFKu58xGqtYZ6UQAtXwtLuXcFVFkQwwnhlHzxH7Dl82-lxC2rG-NT1e_oDAQ5Bt4aDLuwqBBEQ37j-zxl_lw1HTAvhB599-aZ9MW5HZtkEFD0uV1xiTKRcB63lhXezva113JsMOkpMJ"/>
</div>
<h1 class="font-headline text-[1.5rem] font-bold tracking-tight text-on-surface mb-1">Atelier Academy</h1>
<p class="text-on-surface-variant text-sm tracking-wide">Welcome back to the atelier.</p>
</div>
<!-- Login Form Container -->
<div class="bg-surface-container-lowest rounded-full p-10 shadow-[0px_12px_32px_rgba(42,52,57,0.04)] border border-outline-variant/10">
<form action="#" class="space-y-6">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface text-[0.875rem] focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[inset_0_0_0_1.5px_#006a6120] transition-all duration-200 placeholder:text-outline/60" id="email" name="email" placeholder="name@school.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface text-[0.875rem] focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[inset_0_0_0_1.5px_#006a6120] transition-all duration-200 placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center px-1">
<input class="w-4 h-4 rounded-lg border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="ml-3 text-[0.875rem] text-on-surface-variant cursor-pointer" for="remember">Keep me signed in</label>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-8 text-center">
<p class="text-[0.875rem] text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30" href="#">Contact Administrator</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<footer class="mt-12 text-center text-outline/50 text-[0.6875rem] font-medium tracking-[0.05em] uppercase flex items-center justify-center gap-4">
<span>© 2024 Atelier Academy</span>
<span class="w-1 h-1 rounded-full bg-outline/20"></span>
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 rounded-full bg-outline/20"></span>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</footer>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-0 right-0 p-12 pointer-events-none opacity-20 hidden lg:block">
<div class="w-64 h-64 border-[40px] border-primary-container/20 rounded-full"></div>
</div>
<div class="fixed bottom-0 left-0 p-12 pointer-events-none opacity-20 hidden lg:block">
<div class="w-48 h-48 bg-primary-container/10 rounded-full blur-3xl"></div>
</div>
